server:
  port: 8081

spring:
  application:
    name: rewind-admin
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
      idle-timeout: 30000
      connection-timeout: 30000
      max-lifetime: 30000
      connection-test-query: SELECT 1
      validation-timeout: 5000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET:Rewind.ai_Secret_Key_2024_JWT_Token_Very_Long_Secret_For_HS256}
  expiration: 604800000
  header: Authorization
  prefix: Bearer

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    groups-order: DESC
  group-configs:
    - group: admin-api
      paths-to-match: /admin/**
      packages-to-scan: com.rewindai.admin
